plugins {
    id 'java'
    id 'jvm-test-suite'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(rootProject.ext.jvmVersion))
    }
}

apply from: "$rootProject.projectDir/srcsets.gradle"

dependencies {

    implementation project(':code:common:config')
    implementation project(':code:common:model')
    implementation project(':code:common:db')
    implementation project(':code:libraries:classifier-net')
    implementation project(':code:libraries:marginalia-api-client')
    implementation project(':code:functions:language-processing')


    implementation libs.bundles.slf4j
    implementation libs.prometheus
    implementation libs.guava
    implementation libs.bundles.gson
    implementation libs.commons.lang3
    implementation dependencies.create(libs.guice.get()) {
        exclude group: 'com.google.guava'
    }
    implementation libs.notnull
    implementation libs.fastutil
    implementation libs.sqlite
    implementation libs.bundles.mariadb

    testImplementation libs.bundles.slf4j.test
    testImplementation libs.bundles.junit
    testImplementation libs.mockito

    testImplementation platform('org.testcontainers:testcontainers-bom:1.21.4') {
        exclude group: 'org.apache.commons'
    }
    testImplementation libs.commons.compress
    testImplementation libs.commons.codec
    testImplementation project(':code:common:service')
    testImplementation 'org.testcontainers:mariadb:1.21.4'
    testImplementation 'org.testcontainers:junit-jupiter:1.21.4'
    testImplementation project(':code:libraries:test-helpers')
}

tasks.register('trainNsfwModel', JavaExec) {
    description = 'Train the NSFW document classifier and save the model'
    group = 'training'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'nu.marginalia.nsfw.document.NsfwDocumentModelTrainer'
    args = [
            "${rootProject.projectDir}/run/model/nsfw-model"
    ]
}

tasks.register('nsfwModelGrowSampleData', JavaExec) {
    description = 'Using qwen as an oracle, label more samples via the Marginalia API'
    group = 'training'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'nu.marginalia.nsfw.document.NsfwDocumentModelSampleGathering'
    standardInput = System.in
    args = []
    dependsOn('trainNsfwModel')
}
